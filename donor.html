<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donor Dashboard — Sikh Aid Global</title>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --navy:#00365B; --orange:#F44708; --orange2:#EE802F; }
    *,*::before,*::after{box-sizing:border-box;}
    body{font-family:'Jost',sans-serif;background:#F0F2F5;margin:0;min-height:100vh;}
    .topbar{background:var(--navy);padding:18px 0;text-align:center;}
    .topbar img{height:46px;}
    .wrap{max-width:920px;margin:0 auto;padding:32px 16px 60px;}
    .hero{background:#fff;border-radius:16px;padding:32px;box-shadow:0 4px 24px rgba(0,0,0,.06);margin-bottom:24px;}
    .hero h2{color:var(--navy);font-weight:800;margin-bottom:4px;}
    .hero p{color:#6B7280;margin:0;}
    .card-sag{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.06);overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    th{background:#F9FAFB;font-size:.73rem;text-transform:uppercase;letter-spacing:.5px;color:#6B7280;padding:12px 16px;text-align:left;font-weight:700;}
    td{padding:14px 16px;border-top:1px solid #F3F4F6;font-size:.9rem;color:#111827;}
    .amount{font-weight:700;color:var(--orange);}
    .empty,.loading{text-align:center;padding:60px 24px;color:#9CA3AF;}
    .empty i,.loading i{font-size:2.6rem;margin-bottom:14px;display:block;color:#D1D5DB;}
    .footer-note{text-align:center;color:#9CA3AF;font-size:.78rem;margin-top:28px;}
  </style>
</head>
<body>

  <div class="topbar">
    <img src="https://sikhaidglobal.com/images/newLogo.png" alt="Sikh Aid Global" onerror="this.style.display='none'">
  </div>

  <div class="wrap">
    <div id="content">
      <div class="loading"><i class="fas fa-spinner fa-spin"></i>Loading your dashboard…</div>
    </div>
    <div class="footer-note">Sikh Aid Global &bull; info@sikhaidglobal.org</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBrwnnvO4Lm6tX-aeYf5xmhJWIp4JPCQTc",
      authDomain: "sikh-aid-global.firebaseapp.com",
      projectId: "sikh-aid-global",
      storageBucket: "sikh-aid-global.firebasestorage.app",
      messagingSenderId: "1051932848118",
      appId: "1:1051932848118:web:7dd77fe18e04288557a1d7"
    });
    const db = firebase.firestore();

    function fd(v) {
      if (!v) return '—';
      try {
        const d = v?.toDate ? v.toDate() : new Date(v);
        return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      } catch { return '—'; }
    }
    function esc(s) {
      return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function showNotFound() {
      document.getElementById('content').innerHTML = `
        <div class="card-sag">
          <div class="empty">
            <i class="fas fa-link-slash"></i>
            <h5 style="color:var(--navy);font-weight:700">We couldn't find that link</h5>
            <p>This donor link may be incorrect or no longer active. Please contact <strong>info@sikhaidglobal.org</strong> if you believe this is a mistake.</p>
          </div>
        </div>`;
    }

    async function loadPortal() {
      const token = new URLSearchParams(window.location.search).get('t');
      if (!token) { showNotFound(); return; }
      try {
        const snap = await db.collection('donorPortal').doc(token).get();
        if (!snap.exists) { showNotFound(); return; }
        render(snap.data());
      } catch (e) {
        showNotFound();
      }
    }

    function render(data) {
      const items = data.items || [];
      const totalAmount = items.reduce((sum,i)=>sum+(+i.amount||0),0);
      const rows = items.map(i => `<tr>
        <td style="font-weight:600">${esc(i.studentName)}</td>
        <td>${esc(i.grade||'—')}${i.school?' &bull; '+esc(i.school):''}</td>
        <td>${esc(i.receivingParty||'—')}</td>
        <td class="amount">£${(+i.amount||0).toLocaleString()}</td>
        <td style="text-transform:capitalize">${esc(i.fundingType||'—')}</td>
        <td>${fd(i.matchedAt)}</td>
      </tr>`).join('');

      document.getElementById('content').innerHTML = `
        <div class="hero">
          <h2>Welcome, ${esc(data.donorName||'Donor')}</h2>
          <p>Thank you for your generous support. Here is where your contributions have gone.</p>
        </div>
        <div class="card-sag">
          <div style="overflow-x:auto">
            <table>
              <thead><tr><th>Student</th><th>Grade / School</th><th>Institute</th><th>Amount</th><th>Type</th><th>Matched</th></tr></thead>
              <tbody>${rows || `<tr><td colspan="6" style="text-align:center;color:#9CA3AF;padding:40px">No donations on record yet.</td></tr>`}</tbody>
            </table>
          </div>
        </div>
        ${items.length ? `<p style="text-align:right;margin-top:14px;color:#6B7280;font-size:.86rem">Total contributed: <strong style="color:var(--navy)">£${totalAmount.toLocaleString()}</strong></p>` : ''}
      `;
    }

    loadPortal();
  </script>
</body>
</html>
